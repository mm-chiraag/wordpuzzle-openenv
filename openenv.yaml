name: wordpuzzle-openenv
version: "1.0.0"
description: "WordPuzzle — A Wordle-style mini-game RL environment"
author: CHIRAAG-MM

environment:
  entry_point: run_standalone.py
  class: WordPuzzleEnvironment
  interface: openenv

tasks:
  - id: wordpuzzle-easy
    level: 1
    description: "Guess a 4-letter word in 6 attempts"
  - id: wordpuzzle-medium
    level: 2
    description: "Guess a 5-letter word in 5 attempts"
  - id: wordpuzzle-hard
    level: 3
    description: "Guess a 6-letter word in 4 attempts"

server:
  port: 7860
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
